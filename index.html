    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a Minimum Viable Audience (MVA)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A Minimum Viable Audience (MVA) is the smallest group of engaged, paying fans you need before launching a product. Instead of building a product first and hoping people show up, the MVA framework validates demand by building an audience of 1,000 true fans in 90 days through quizzes, email funnels, paid ads, and community activation."
          }
        },
        {
          "@type": "Question",
          "name": "How does the MVA 90-day program work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The program has 3 phases: Phase 1 (Build, weeks 1-4) sets up persona mapping, quiz landing pages, email sequences, and a $1 Stripe Early Bird flow. Phase 2 (Drive, weeks 5-8) launches Meta and TikTok ads using the Andromeda framework with weekly optimization. Phase 3 (Launch, weeks 9-12) creates Lookalike audiences from paying subscribers and runs a full launch campaign across all channels."
          }
        },
        {
          "@type": "Question",
          "name": "How do I calculate my Minimum Viable Audience?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Use the free MVA calculator at jay23.com. Select your product type (SaaS, course, physical product, etc.), target revenue, price point, and niche specificity. The calculator estimates the audience size needed before launch and recommends a strategy based on your inputs."
          }
        },
        {
          "@type": "Question",
          "name": "Why should I build an audience before launching?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Building an audience first validates demand, reduces launch risk, and ensures you have customers ready to buy. Research shows that 90% of startups fail, often because they build products nobody wants. The MVA approach lets you collect $1 Early Bird payments as proof of demand before investing in full product development."
          }
        },
        {
          "@type": "Question",
          "name": "What results can I expect from the MVA program?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Typical results include 300+ qualified leads by end of month 3, 30+ paying Early Bird subscribers before launch, a maximum cost per lead of 25 PLN (guaranteed), and campaigns running across 3 channels: paid ads, email automation, and WhatsApp community."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between MVA and MVP?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An MVP (Minimum Viable Product) is the simplest version of a product you can build. An MVA (Minimum Viable Audience) is the smallest audience you need before building or launching that product. The MVA approach is audience-first: validate demand with real people (and real payments) before investing time and money in product development."
          }
        }
      ]
    }
    </script>
